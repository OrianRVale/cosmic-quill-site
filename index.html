    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --void-black: #050506;
            --deep-black: #0a0a0c;
            --soft-gold: #d4af37;
            --pale-gold: #f4e4bc;
            --ghost-gray: #888888;
            --light-gray: #cccccc;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: var(--void-black);
            color: var(--light-gray);
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        #star-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(5, 5, 6, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
            z-index: 1000;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }

        .logo {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            height: 50px;
            width: auto;
            mix-blend-mode: screen; 
            transition: transform 0.3s ease;
        }

        .logo:hover .logo-img {
            transform: scale(1.05);
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5));
        }

        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--soft-gold);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            font-family: 'Cinzel', serif;
            color: var(--light-gray);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .nav-links a:hover { color: var(--soft-gold); }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-top: 60px;
        }

        .cosmic-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 700;
            color: var(--soft-gold);
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            animation: breathe 6s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.9; text-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
            50% { opacity: 1; text-shadow: 0 0 25px rgba(212, 175, 55, 0.5); }
        }

        .rolling-glyphs {
            font-size: 1.8rem;
            color: var(--soft-gold);
            opacity: 0.8;
            margin: 1.5rem 0;
            letter-spacing: 2rem;
            height: 2rem;
            display: flex;
            justify-content: center;
        }

        .rune { display: inline-block; transition: opacity 0.3s ease; }

        .tagline {
            font-size: 1.3rem;
            color: var(--ghost-gray);
            margin-bottom: 2rem;
            font-style: italic;
            letter-spacing: 1px;
        }

        .description {
            font-size: 1.1rem;
            max-width: 700px;
            margin: 0 auto 3rem;
            color: var(--light-gray);
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .cta-btn {
            display: inline-block;
            padding: 14px 28px;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-gold {
            background: transparent;
            color: var(--soft-gold);
            border: 1px solid var(--soft-gold);
        }

        .btn-gold:hover {
            background: var(--soft-gold);
            color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .btn-ghost {
            color: var(--ghost-gray);
            border: 1px solid var(--ghost-gray);
        }

        .btn-ghost:hover {
            border-color: var(--pale-gold);
            color: var(--pale-gold);
        }

        .section { padding: 80px 0; border-top: 1px solid rgba(212, 175, 55, 0.1); }

        .section h2 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            color: var(--soft-gold);
            text-align: center;
            margin-bottom: 3rem;
        }

        .featured-work {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .book-showcase { text-align: center; }

        .book-cover-shadow {
            max-width: 320px;
            width: 100%;
            height: auto;
            border: 1px solid var(--soft-gold);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .book-cover-shadow:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        /* Temporary Cover Placeholder for The Covenant */
        .cover-placeholder {
            max-width: 320px;
            width: 100%;
            aspect-ratio: 2 / 3;

            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: var(--soft-gold);
            font-family: 'Cinzel', serif;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            transition: all 0.3s ease;
        }

        .cover-placeholder:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        .work-details h3 {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: #fff;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: var(--soft-gold);
            margin-bottom: 1.5rem;
            display: block;
        }

            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 1rem;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
